<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6246ea">
    <title>Maribel · IA Personal</title>
    <!-- Librerías -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; transition: background-color 0.3s, color 0.2s; }
        body.light { background: linear-gradient(145deg, #f0f2fa, #d9dff0); }
        body.dark { background: linear-gradient(145deg, #0a0c18, #1a1d30); }
        .app-container { width: 100%; max-width: 1400px; height: 96vh; margin: 2vh auto; border-radius: 40px; overflow: hidden; display: flex; flex-direction: column; position: relative; box-shadow: 0 30px 60px #00000080; }
        body.dark .app-container { background: rgba(22,26,45,0.95); border: 1px solid #6246ea; }
        body.light .app-container { background: rgba(255,255,255,0.9); border: 1px solid #aaa; }
        .hologram-container { position: absolute; top: 15px; right: 25px; width: 190px; height: 190px; z-index: 20; pointer-events: none; filter: drop-shadow(0 0 25px #9f8eff); }
        canvas#hologramCanvas { width: 100%; height: 100%; border-radius: 50%; }
        .header { padding: 18px 28px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid; }
        body.dark .header { background: rgba(18,22,40,0.9); border-color: #6246ea; }
        body.light .header { background: rgba(240,242,250,0.9); border-color: #aaa; }
        .header h1 { font-size: 2rem; display: flex; align-items: center; gap: 12px; }
        body.dark .header h1 { color: #f0edff; }
        body.light .header h1 { color: #222; }
        .header h1 span { background: #6246ea; padding: 6px 16px; border-radius: 40px; font-size: 1rem; color: white; }
        .personality-selector { display: flex; gap: 8px; background: #262c4e; padding: 5px 12px; border-radius: 50px; }
        .perso-btn { background: transparent; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
        body.dark .perso-btn { color: #b7c2ff; }
        body.light .perso-btn { color: #333; }
        .perso-btn.active { background: #7b63ff; color: white; }
        .theme-toggle, .admin-btn, .install-btn { background: #2f3562; border: 1px solid #676fb0; color: #d3dcff; font-size: 1.2rem; padding: 8px 20px; border-radius: 60px; cursor: pointer; margin-left: 10px; }
        .install-btn { background: #4f3bbf; display: none; } /* oculto hasta que sea instalable */
        .chat-area { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        body.dark .chat-area { background: #0d1125c0; }
        body.light .chat-area { background: #eef2f9; }
        .message { max-width: 78%; padding: 16px 24px; border-radius: 30px; line-height: 1.6; font-size: 1.05rem; animation: fadeIn 0.3s ease; position: relative; }
        .user-message { align-self: flex-end; background: #3d427a; color: white; border-bottom-right-radius: 6px; }
        .ai-message { align-self: flex-start; background: #252b53; color: #e8edff; border-bottom-left-radius: 6px; }
        body.light .ai-message { background: #d0d6f0; color: #111; }
        .timestamp { font-size: 0.7rem; opacity: 0.6; margin-top: 6px; text-align: right; }
        .teach-btn, .vote-btn { position: absolute; bottom: 6px; font-size: 0.7rem; padding: 2px 10px; border-radius: 20px; cursor: pointer; opacity: 0; transition: 0.2s; border: none; }
        .teach-btn { right: 10px; background: #6f5be0; color: white; }
        .vote-btn { right: 75px; background: #3f518b; color: white; }
        .vote-btn.down { right: 140px; }
        .ai-message:hover .teach-btn, .ai-message:hover .vote-btn { opacity: 1; }
        .input-footer { padding: 20px 30px; display: flex; gap: 18px; border-top: 1px solid; }
        body.dark .input-footer { background: #0d132f; border-color: #6246ea; }
        body.light .input-footer { background: #f0f2fa; border-color: #aaa; }
        .input-footer input { flex: 1; background: #1b2147; border: 1px solid #6246ea; border-radius: 60px; padding: 18px 28px; color: white; font-size: 1.05rem; outline: none; }
        body.light .input-footer input { background: white; color: black; border-color: #aaa; }
        .input-footer button { background: #6246ea; border: none; border-radius: 60px; padding: 0 30px; color: white; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-left: 5px; }
        .install-banner { text-align: center; padding: 10px; background: #6246ea; color: white; cursor: pointer; display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .creator-badge { text-align: center; color: #8895d3; padding: 5px; }
    </style>
</head>
<body class="dark">
    <!-- Instalación banner -->
    <div id="installBanner" class="install-banner">📲 Maribel puede instalarse como app. ¡Haz clic aquí!</div>

    <div class="app-container">
        <div class="hologram-container">
            <canvas id="hologramCanvas" width="200" height="200"></canvas>
        </div>

        <div class="header">
            <h1>🧠 Maribel · <span>de Wilfer</span></h1>
            <div style="display: flex; gap: 10px;">
                <div class="personality-selector">
                    <button class="perso-btn active" data-perso="formal">👔 Formal</button>
                    <button class="perso-btn" data-perso="divertido">🎉 Divertida</button>
                    <button class="perso-btn" data-perso="tecnico">💻 Técnica</button>
                    <button class="perso-btn" data-perso="empatica">🤗 Empática</button>
                </div>
                <button class="theme-toggle" id="themeToggle">🌓</button>
                <button class="install-btn" id="installBtn">📲 Instalar</button>
                <button class="admin-btn" id="openAdminBtn">⚙️ Panel</button>
            </div>
        </div>

        <div id="chatMessages" class="chat-area">
            <!-- Mensajes -->
        </div>

        <div class="input-footer">
            <input type="text" id="userInput" placeholder="Pregúntame, o activa el micrófono...">
            <button id="micBtn">🎤</button>
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <!-- Panel admin (contenido omitido por brevedad, pero idéntico a la versión anterior) -->
    <div id="adminOverlay" class="admin-overlay">...</div>

    <script>
        // ---------- PWA: MANIFEST Y SERVICE WORKER ----------
        (function() {
            // Crear manifest dinámicamente
            const manifest = {
                name: "Maribel IA",
                short_name: "Maribel",
                description: "Tu IA personal con visión, voz y aprendizaje.",
                start_url: ".",
                display: "standalone",
                background_color: "#1c2248",
                theme_color: "#6246ea",
                icons: [
                    {
                        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%236246ea'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3E🧠%3C/text%3E%3C/svg%3E",
                        sizes: "192x192",
                        type: "image/svg+xml"
                    }
                ]
            };
            const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            const manifestUrl = URL.createObjectURL(manifestBlob);
            const linkManifest = document.createElement('link');
            linkManifest.rel = 'manifest';
            linkManifest.href = manifestUrl;
            document.head.appendChild(linkManifest);

            // Service Worker inline (generado como blob)
            const swCode = `
                self.addEventListener('install', (event) => {
                    self.skipWaiting();
                });
                self.addEventListener('activate', (event) => {
                    event.waitUntil(clients.claim());
                });
                self.addEventListener('fetch', (event) => {
                    event.respondWith(
                        caches.match(event.request).then((response) => {
                            return response || fetch(event.request);
                        })
                    );
                });
            `;
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(swBlob);

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register(swUrl).then(reg => {
                    console.log('Service Worker registrado');
                }).catch(err => {
                    console.log('Error al registrar SW:', err);
                });
            }

            // Lógica de instalación (beforeinstallprompt)
            let deferredPrompt;
            const installBtn = document.getElementById('installBtn');
            const installBanner = document.getElementById('installBanner');

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installBtn.style.display = 'inline-block';
                installBanner.style.display = 'block';
            });

            installBtn.addEventListener('click', () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        if (choiceResult.outcome === 'accepted') {
                            console.log('Usuario aceptó instalar');
                        }
                        deferredPrompt = null;
                        installBtn.style.display = 'none';
                        installBanner.style.display = 'none';
                    });
                }
            });

            installBanner.addEventListener('click', () => {
                installBtn.click();
            });

            // Si ya está instalada, ocultar botones
            window.addEventListener('appinstalled', () => {
                installBtn.style.display = 'none';
                installBanner.style.display = 'none';
                console.log('Maribel instalada');
            });
        })();

        // ---------- RESTO DEL CÓDIGO DE MARIBEL (mantenemos todo igual que la versión anterior) ----------
        // (Aquí va todo el código JavaScript de la versión anterior, incluyendo cifrado, autenticación, etc.)
        // Por brevedad, lo omito en esta respuesta, pero en la implementación real debes copiar el bloque completo
        // de la versión anterior (la que incluía cifrado, Wikipedia, etc.) justo después de este comentario.
        // ...
    </script>
    <div class="creator-badge">⚡ Maribel · creada por Wilfer Rivera · PWA lista para instalar</div>
</body>
</html>
